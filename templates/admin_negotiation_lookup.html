{% extends 'base.html' %}
{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-2">
                        Negotiation Lookup
                    </h2>

                    <p class="text-muted mb-4">
                        Enter customer negotiation code
                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-4">

                            <label class="form-label">
                                Negotiation Code
                            </label>

                            <input type="text" name="code" class="form-control form-control-lg" placeholder="NEG-8F3K2Q"
                                required>

                        </div>

                        <button class="btn btn-danger btn-lg w-100">

                            Load Negotiation

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
