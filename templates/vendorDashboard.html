<!DOCTYPE html>
<html>
<h2>Vendor Dashboard</h2>

<div class="dashboard">

    <div class="card">
        <h3>Balance</h3>
        <p>₦{{ wallet.balance }}</p>
    </div>

    <div class="card">
        <h3>Total Orders</h3>
        <p>{{ items.count }}</p>
    </div>

</div>

<h3>Orders</h3>

{% for item in items %}
<div class="order-row">
    <p>{{ item.product.name }}</p>
    <p>Status: {{ item.status }}</p>

    {% if item.status == "pending" %}
    <a href="{% url 'mark_shipped' item.id %}">Mark as Shipped</a>
    {% endif %}
</div>
{% endfor %}

</html>
