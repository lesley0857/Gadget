{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">

        Quotation Approval

    </h2>

    <form method="post">

        {% csrf_token %}

        <div class="card shadow-sm">

            <div class="card-body">

                <table class="table">

                    <thead>

                        <tr>

                            <th>Product</th>

                            <th>Qty</th>

                            <th>Original</th>

                            <th>Negotiated</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for item in negotiation.items.all %}

                        <tr>

                            <td>
                                {{ item.product_listing.name }}
                            </td>

                            <td>

                                <input type="number" name="qty_{{ item.id }}" value="{{ item.quantity }}"
                                    class="form-control" required>

                            </td>

                            <td>
                                ₦{{ item.original_price }}
                            </td>

                            <td>

                                <input type="number" step="0.01" name="price_{{ item.id }}"
                                    value="{{ item.original_price }}" class="form-control" required>

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

                <div class="mt-4">

                    <label>

                        Shipping Fee

                    </label>

                    <input type="number" step="0.01" name="shipping_fee" class="form-control" required>

                </div>

                <button type="submit" class="btn btn-success mt-4">

                    Approve & Email Customer

                </button>

            </div>

        </div>

    </form>

</div>

{% endblock %}
