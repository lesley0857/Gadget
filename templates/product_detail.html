{% extends 'base.html' %}

{% block title %}{{ product.name }} - Phone Ecommerce{% endblock %}

{% block content %}
<section class="product-detail">
    <img src="{{ product.image.url }}" alt="{{ product.name }}">
    <div class="product-info">
        <h2>{{ product.name }}</h2>
        <p>${{ product.price }}</p>
        <p>{{ product.description }}</p>
        <button class="btn">Add to Cart</button>
    </div>
</section>
{% endblock %}
