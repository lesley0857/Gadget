{% load static %}

<section class="services-page" id="service_id">

    <div class="container">

        <div class="section-header">

            <span class="section-badge">
                OUR SERVICES
            </span>

            <h2>
                Industrial Electrical & Engineering Solutions
            </h2>

            <p>
                Professional installation, maintenance and industrial engineering services.
            </p>

        </div>

        <div class="services-grid">

            {% for service in services %}

            <div class="service-card">

                <div class="service-image">

                    <img src="{{ service.hero_image.url }}" alt="{{ service.title }}">

                </div>

                <div class="service-body">

                    <div class="service-icon">

                        <i class="{{ service.icon }}"></i>

                    </div>

                    <h3>
                        {{ service.title }}
                    </h3>

                    <p>
                        {{ service.short_description|truncatewords:20 }}
                    </p>

                    <a href="{% url 'service_detail' service.slug %}">
                        Learn More
                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</section>

<style>
    .services-page {

        padding: 80px 0;

        background: #F9FAFB;
    }

    .section-header {

        text-align: center;

        margin-bottom: 60px;
    }

    .section-badge {

        display: inline-block;

        background: #FEE2E2;

        color: #2A7DB4;

        padding: 10px 20px;

        border-radius: 30px;

        font-size: 13px;

        font-weight: 700;

        margin-bottom: 20px;
    }

    .section-header h2 {

        font-size: 42px;

        font-weight: 800;

        margin-bottom: 18px;
    }

    .section-header p {

        max-width: 700px;

        margin: auto;

        color: #6B7280;

        line-height: 1.8;
    }

    .services-grid {

        display: grid;

        grid-template-columns: repeat(3, 1fr);

        gap: 30px;
    }

    .service-card {

        background: white;

        border-radius: 24px;

        overflow: hidden;

        transition: .35s ease;

        box-shadow: 0 4px 20px rgba(0, 0, 0, .04);
    }

    .service-card:hover {

        transform: translateY(-8px);
    }

    .service-image {

        height: 240px;

        overflow: hidden;
    }

    .service-image img {

        width: 100%;

        height: 100%;

        object-fit: cover;
    }

    .service-body {

        padding: 28px;
    }

    .service-icon {

        width: 60px;

        height: 60px;

        border-radius: 50%;

        background: #2A7DB4;

        color: white;

        display: flex;

        align-items: center;

        justify-content: center;

        font-size: 22px;

        margin-bottom: 20px;
    }

    .service-body h3 {

        font-size: 22px;

        font-weight: 700;

        margin-bottom: 16px;
    }

    .service-body p {

        color: #6B7280;

        line-height: 1.8;

        margin-bottom: 24px;
    }

    .service-body a {

        display: inline-flex;

        align-items: center;

        gap: 10px;

        color: #2A7DB4;

        font-weight: 700;
    }

    @media(max-width:992px) {

        .services-grid {

            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media(max-width:768px) {

        .services-grid {

            grid-template-columns: 1fr;
        }

        .section-header h2 {

            font-size: 32px;
        }
    }
</style>
