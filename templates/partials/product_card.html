<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>

    document.addEventListener("DOMContentLoaded", function () {

        new Swiper(".trendingSwiper", {

            slidesPerView: 3,

            spaceBetween: 15,

            loop: true,

            autoplay: {

                delay: 3500,

                disableOnInteraction: false,

            },

            navigation: {

                nextEl: ".swiper-button-next",

                prevEl: ".swiper-button-prev",

            },

            breakpoints: {

                768: {

                    slidesPerView: 5,

                    spaceBetween: 20,

                }

            }

        });

    });

</script>
<style>
    .product-card {

        position: relative;

        display: flex;

        flex-direction: column;

        background: #fff;

        border: 1px solid #ececec;

        border-radius: 10px;

        overflow: hidden;

        transition: all .25s ease;

        width: 100%;

        max-width: 170px;
    }

    .product-card:hover {

        transform: translateY(-4px);

        box-shadow:
            0 8px 25px rgba(0, 0, 0, .08);
    }

    .product-link {

        text-decoration: none;

        color: inherit;
    }

    .product-image {

        width: 100%;

        aspect-ratio: 1;

        padding: 8px;

        background: #fff;
    }

    .product-image img {

        width: 100%;

        height: 100%;

        object-fit: contain;
    }

    .product-body {

        padding: 8px;
    }

    .product-name {

        font-size: .75rem;

        font-weight: 600;

        line-height: 1.25;

        height: 34px;

        overflow: hidden;

        display: -webkit-box;

        -webkit-line-clamp: 2;

        -webkit-box-orient: vertical;

        margin-bottom: 6px;

        color: #222;
    }

    .product-price {

        font-size: .9rem;

        font-weight: 700;

        color: #0d6efd;

        margin-bottom: 2px;
    }

    .sold-count {

        font-size: .68rem;

        color: #777;

        margin-bottom: 6px;
    }

    .negotiable {

        display: inline-block;

        font-size: .65rem;

        padding: 3px 8px;

        border-radius: 20px;

        background: #fff4e5;

        color: #d97706;
    }

    .cart-btn {

        position: absolute;

        bottom: 8px;

        right: 8px;

        width: 34px;

        height: 34px;

        border: none;

        border-radius: 50%;

        background: #0d6efd;

        color: white;

        cursor: pointer;

        display: flex;

        align-items: center;

        justify-content: center;

        box-shadow:
            0 3px 10px rgba(13, 110, 253, .3);

        transition: .2s;
    }

    .cart-btn:hover {

        transform: scale(1.1);

        background: #0b5ed7;
    }

    /* ########MOBILE#### */
    @media (max-width:768px) {

        .product-card {

            max-width: 140px;
        }

        .product-name {

            font-size: .72rem;

            height: 32px;
        }

        .product-price {

            font-size: .85rem;
        }

        .cart-btn {

            width: 30px;

            height: 30px;
        }
    }
</style>

<div class="product-card">

    <a href="{% url 'product_detail' product.name %}" class="product-link">

        <div class="product-image">

            {% with media=product.media.first %}
            {% if media %}
            <img src="{{ media.file.url }}">
            {% endif %}
            {% endwith %}

        </div>

        <div class="product-body">

            <div class="product-name">
                {{ product.name }}
            </div>

            <div class="product-price">
                ₦{{ product.final_price }}
            </div>

            {% if product.units_sold %}
            <div class="sold-count">
                {{ product.units_sold }} sold
            </div>
            {% endif %}

            {% if product.is_negotiable %}
            <span class="negotiable">
                Negotiable
            </span>
            {% endif %}

        </div>

    </a>

    <!-- OUTSIDE LINK -->
    <button class="cart-btn add-to-cart-btn" data-id="{{ product.id }}" title="Add To Cart">

        <i class="fa fa-shopping-cart"></i>

    </button>

</div>
