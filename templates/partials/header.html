{% load static %}

<!-- =========================
HEADER SCRIPT
========================= -->
<script>

    document.addEventListener("DOMContentLoaded", function () {

        /* =========================
        MOBILE NAVIGATION
        ========================= */

        const menuBtn = document.getElementById("mobile-menu-btn");

        const nav = document.getElementById("responsive-nav");

        if (menuBtn && nav) {

            menuBtn.addEventListener("click", function (e) {

                e.stopPropagation();

                nav.classList.toggle("active");

                /* LOCK BODY SCROLL */
                document.body.classList.toggle("nav-open");

            });

            /* CLOSE WHEN CLICKING OUTSIDE */
            document.addEventListener("click", function (e) {

                if (
                    !nav.contains(e.target) &&
                    !menuBtn.contains(e.target)
                ) {

                    nav.classList.remove("active");

                    document.body.classList.remove("nav-open");

                }

            });

        }

    });

</script>

TOP HEADER
========================= -->

<!-- =========================
MAIN HEADER
========================= -->
<header id="main-header">

    <div class="container navbar-container">

        <!-- LOGO -->

                    <span class="logo-main">
                        REMAROBE
                    </span>

                        Electrical Engineering

        </div>


        <!-- ACTIONS -->

            <button type="button" class="cart-link" id="cart-toggle-btn">

                <i class="fa fa-shopping-cart"></i>

                <span>Cart</span>

                <div class="qty cart-count">
                    0

            </button>

    </div>


    <!-- SEARCH SECTION -->
    <div class="container search-container">

        <div class="search-area">

            <form action="{% url 'search_products' %}" method="GET">

                <div class="search-wrapper">

                    <!-- CATEGORY -->
                    <select class="search-category" onchange="if(this.value){location=this.value;}">

                        <option value="">
                            All Categories
                        </option>

                        {% for category in categories %}

                        <option value="{% url 'category_products' category.name %}">
                            {{ category.name }}
                        </option>

                        {% endfor %}

                    </select>

                    <!-- SEARCH -->
                    <input type="text" name="q" id="search-input"
                        placeholder="Search electrical products, earthing materials, contactors...">

                    <!-- BUTTON -->
                    <button type="submit" class="search-btn">

                        <i class="fa fa-search"></i>

                    </button>

                    <!-- DROPDOWN -->
                    <div id="search-suggestions" class="suggestions-box"></div>

                </div>

            </form>

</header>

<!-- =========================
SEARCH JS
========================= -->
<script>
    const input = document.getElementById("search-input");

    const box = document.getElementById("search-suggestions");

    if (input && box) {

        input.addEventListener("keyup", function () {

            const query = input.value;

            if (query.length < 2) {

                box.style.display = "none";

                return;
            }

            fetch(`/search-suggestions/?q=${query}`)

                .then(res => res.json())

                .then(data => {

                    box.innerHTML = "";

                    if (data.results.length === 0) {

                        box.style.display = "none";

                        return;
                    }

                    data.results.forEach(item => {

                        box.innerHTML += `
                        <div class="suggestion-item" data-name="${item.name}">
                            ${item.name}
                        </div>
                    `;
                    });

                    box.style.display = "block";

                });

        });

        document.addEventListener("click", function (e) {

            if (e.target.classList.contains("suggestion-item")) {

                const name = e.target.dataset.name;

                input.value = name;

                window.location.href = `/search/?q=${name}`;

            } else {

                box.style.display = "none";

            }

        });

    }
</script>
