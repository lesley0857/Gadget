<section class="blog-section">

    <div class="container">
        <style>
            /* =========================
BLOG SECTION
========================= */

            .blog-section {
                padding: 70px 0;
                background: #f8fafc;
            }

            .blog-section .container {
                max-width: 1400px;
                margin: auto;
            }

            .section-title {
                font-size: 32px;
                font-weight: 800;
                color: #111827;
                margin-bottom: 35px;
                text-align: center;
            }

            /* GRID */

            .blog-carousel {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 24px;
            }

            /* CARD */

            .blog-card {
                background: #fff;
                border-radius: 18px;
                overflow: hidden;
                text-decoration: none;
                transition: .3s ease;
                box-shadow: 0 5px 18px rgba(0, 0, 0, .06);
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            .blog-card:hover {
                transform: translateY(-6px);
                box-shadow: 0 15px 35px rgba(0, 0, 0, .12);
            }

            /* IMAGE */

            .blog-card img {
                width: 100%;
                height: 220px;
                object-fit: cover;
                display: block;
                background: #f3f4f6;
            }

            /* CONTENT */

            .blog-content {
                padding: 18px;
                display: flex;
                flex-direction: column;
                flex: 1;
            }

            .blog-content h3 {
                font-size: 18px;
                font-weight: 700;
                color: #111827;
                margin-bottom: 12px;

                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .blog-content p {
                color: #6b7280;
                font-size: 14px;
                line-height: 1.6;

                display: -webkit-box;
                -webkit-line-clamp: 3;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            /* READ MORE */

            .blog-content::after {
                content: "Read Article →";
                margin-top: auto;
                padding-top: 15px;
                color: #dc2626;
                font-weight: 700;
                font-size: 14px;
            }

            /* TABLET */

            @media (max-width:992px) {

                .blog-carousel {
                    grid-template-columns:
                        repeat(auto-fill, minmax(280px, 1fr));
                }

                .blog-card img {
                    height: 200px;
                }
            }

            /* MOBILE */

            @media (max-width:768px) {

                .blog-section {
                    padding: 50px 0;
                }

                .section-title {
                    font-size: 26px;
                    margin-bottom: 25px;
                }

                .blog-carousel {
                    grid-template-columns: 1fr;
                    gap: 18px;
                }

                .blog-card {
                    border-radius: 14px;
                }

                .blog-card img {
                    height: 180px;
                }

                .blog-content {
                    padding: 15px;
                }

                .blog-content h3 {
                    font-size: 16px;
                }

                .blog-content p {
                    font-size: 13px;
                }
            }
        </style>
        <div class="section-title">

            Latest Engineering Insights

        </div>

        <div class="blog-carousel">

            {% for blog in blogs %}

            <a href="{% url 'blog_detail' blog.slug %}" class="blog-card">

                <img src="{{ blog.featured_image.url }}">

                <div class="blog-content">

                    <h3>

                        {{ blog.title }}

                    </h3>

                    <p>

                        {{ blog.excerpt }}

                    </p>

                </div>

            </a>

            {% endfor %}

        </div>

    </div>

</section>
