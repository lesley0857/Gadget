<section class="blog-section">

    <div class="container">

        <div class="section-title">

            Latest Engineering Insights

        </div>

        <div class="blog-carousel">

            {% for blog in blogs %}

            <a href="{% url 'blog_detail' blog.slug %}" class="blog-card">

                <img src="{{ blog.featured_image.url }}">

                <div class="blog-content">

                    <h3>

                        {{ blog.title }}

                    </h3>

                    <p>

                        {{ blog.excerpt }}

                    </p>

                </div>

            </a>

            {% endfor %}

        </div>

    </div>

</section>
