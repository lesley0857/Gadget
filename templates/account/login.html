{% extends 'base.html' %}
{% load static %}
{% load socialaccount %}

{% block content %}

<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    <input type="email" name="email" placeholder="Email"><br>
    <input type="password" name="password" placeholder="Password"><br>

    <button type="submit">Login</button>

</form>
<a href="/accounts/google/login/">Login with Google</a>
{% endblock %}
