{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}

<section class="auth-section">

    <style>
        .auth-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
            padding: 40px 15px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            color: #111827;
        }

        .auth-input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
        }

        .auth-input:focus {
            border-color: #dc2626;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #111827;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background: #dc2626;
        }

        .auth-divider {
            text-align: center;
            margin: 18px 0;
            position: relative;
            color: #9ca3af;
            font-size: 13px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e5e7eb;
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            text-decoration: none;
            color: #111827;
            font-weight: 600;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: #f3f4f6;
        }

        .auth-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .auth-footer a {
            color: #dc2626;
            font-weight: 600;
            text-decoration: none;
        }
    </style>

    <div class="auth-card">

        <h2 class="auth-title">Create Account</h2>

        <!-- REGISTER FORM -->
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}

            <input class="auth-input" type="text" name="username" placeholder="Username" required>

            <input class="auth-input" type="email" name="email" placeholder="Email" required>

            <input class="auth-input" type="password" name="password" placeholder="Password" required>

            <button class="auth-btn" type="submit">
                Register
            </button>
        </form>

        <!-- DIVIDER -->
        <div class="auth-divider">OR</div>

        <!-- GOOGLE LOGIN -->
        <a class="google-btn" href="{% provider_login_url 'google' %}">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" height="18">
            Continue with Google
        </a>

        <!-- FOOTER -->
        <div class="auth-footer">
            Already have an account?
            <a href="{% url 'account_login' %}">Login</a>
        </div>

    </div>

</section>

{% endblock %}
