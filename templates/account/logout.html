{% extends 'base.html' %}
{% block content %}

<section class="auth-section">

    <style>
        .auth-section {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
        }

        .logout-box {
            background: white;
            padding: 30px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            max-width: 400px;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: #dc2626;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>

    <div class="logout-box">

        <h2>You are about to logout</h2>

        <p>Are you sure you want to end your session?</p>

        <a class="logout-btn" href="{% url 'logout' %}">
            Logout
        </a>

    </div>

</section>

{% endblock %}
